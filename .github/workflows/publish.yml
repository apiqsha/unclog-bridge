name: Publish unclog-bridge

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      bootstrap_first_publish:
        description: Use the one-time NPM_TOKEN secret for the initial package publish
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: https://registry.npmjs.org
          package-manager-cache: false
      - name: Pin npm release client
        run: npm install --global npm@11.17.0
      - name: Install exact dependencies without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Verify tests and release contents
        run: npm run release:audit
      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: node -e "const p=require('./package.json'); if(process.env.GITHUB_REF_NAME !== 'unclog-bridge-v'+p.version) throw new Error('release tag must be unclog-bridge-v'+p.version)"
      - name: Bootstrap first public publish with provenance
        if: github.event_name == 'workflow_dispatch' && inputs.bootstrap_first_publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Publish with npm trusted publishing
        if: github.event_name == 'release'
        run: npm publish --access public
